name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.32.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Fix isar_flutter_libs namespace and compileSdk
        run: |
          ISAR_DIR="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android"
          BUILD_FILE="$ISAR_DIR/build.gradle"
          if [ -f "$BUILD_FILE" ]; then
            if ! grep -q "namespace" "$BUILD_FILE"; then
              sed -i '/android {/a\    namespace "io.isar.isar_flutter_libs"' "$BUILD_FILE"
            fi
            sed -i 's/compileSdk [0-9]*/compileSdk 34/' "$BUILD_FILE"
            sed -i 's/minSdk [0-9]*/minSdk 21/' "$BUILD_FILE"
          fi
          MANIFEST_FILE="$ISAR_DIR/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_FILE" ]; then
            sed -i 's/package="[^"]*"//' "$MANIFEST_FILE"
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libjson-glib-dev
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release --no-tree-shake-icons
      - run: |
          cd build/linux/x64/release/bundle
          tar -czf /tmp/aniwhere-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-linux-x64
          path: /tmp/aniwhere-linux-x64.tar.gz
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release --no-tree-shake-icons
        env:
          CMAKE_GENERATOR: "Visual Studio 18 2026"
      - run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "aniwhere-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-windows-x64
          path: aniwhere-windows-x64.zip
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Set minimum macOS deployment target
        run: |
          sed -i '' 's/platform :osx, .*/platform :osx, '\''10.15'\''/' macos/Podfile
          if ! grep -q "platform :osx" macos/Podfile; then
            echo "platform :osx, '10.15'" >> macos/Podfile
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd macos
          pod install || true
      - run: flutter build macos --release --no-tree-shake-icons
      - run: |
          cd build/macos/Build/Products/Release
          zip -r /tmp/aniwhere-macos.zip aniwhere.app
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-macos
          path: /tmp/aniwhere-macos.zip
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Set minimum iOS deployment target
        run: |
          if [ -f ios/Podfile ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/' ios/Podfile
          else
            echo "platform :ios, '12.0'" > ios/Podfile
          fi
      - name: Patch volume_controller for Flutter 3.29+
        run: |
          VC_DIR="$HOME/.pub-cache/hosted/pub.dev/volume_controller-3.4.4/ios/volume_controller/Sources/volume_controller"
          SWIFT_FILE="$VC_DIR/VolumeControllerPlugin.swift"
          if [ -f "$SWIFT_FILE" ]; then
            sed -i '' '/registrar.addSceneDelegate/d' "$SWIFT_FILE"
            sed -i '' '/@available(iOS 13.0, \*)/,/^}/d' "$SWIFT_FILE"
            echo "Patched volume_controller"
          else
            echo "volume_controller Swift file not found, skipping patch"
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd ios
          pod install || true
      - run: flutter build ios --release --no-codesign
      - run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r /tmp/aniwhere-ios.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-ios
          path: /tmp/aniwhere-ios.ipa
          retention-days: 14
