name: Build Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libjson-glib-dev libasound2-plugins alsa-utils

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release --no-tree-shake-icons

      # flutter_js Issue #105: libquickjs_c_bridge_plugin.so gets installed
      # in the wrong subdirectory (plugins/flutter_js/bundle/lib/) instead of
      # the main bundle/lib/. Copy it to the correct location.
      - name: Fix flutter_js native library location
        run: |
          BUNDLE_LIB="build/linux/x64/release/bundle/lib"
          QUICKJS_SO="libquickjs_c_bridge_plugin.so"
          if [ ! -f "$BUNDLE_LIB/$QUICKJS_SO" ]; then
            echo "⚠️  $QUICKJS_SO not in bundle/lib — searching plugin dirs…"
            FOUND=$(find build/linux/x64/release -name "$QUICKJS_SO" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              cp -v "$FOUND" "$BUNDLE_LIB/"
              echo "✅ Copied $FOUND -> $BUNDLE_LIB/"
            else
              CACHE_SO=$(find .dart_tool -name "$QUICKJS_SO" -type f 2>/dev/null | head -1)
              if [ -n "$CACHE_SO" ]; then
                cp -v "$CACHE_SO" "$BUNDLE_LIB/"
                echo "✅ Copied from cache: $CACHE_SO -> $BUNDLE_LIB/"
              else
                echo "❌ CRITICAL: $QUICKJS_SO not found anywhere — extensions will not work!"
                exit 1
              fi
            fi
          else
            echo "✅ $QUICKJS_SO already in bundle/lib/"
          fi
          ls -la "$BUNDLE_LIB/$QUICKJS_SO"

      # Bundle ALSA plugins so the volume_controller and mpv don't segfault
      # on systems where libasound_module_ctl_null.so is missing.
      - name: Bundle ALSA plugins
        run: |
          BUNDLE_LIB="build/linux/x64/release/bundle/lib"
          ALSA_DIR="$BUNDLE_LIB/alsa-lib"
          mkdir -p "$ALSA_DIR"
          # Copy ALSA plugins from the build system (Ubuntu runner)
          SYS_ALSA="/usr/lib/x86_64-linux-gnu/alsa-lib"
          if [ -d "$SYS_ALSA" ]; then
            cp -v "$SYS_ALSA"/*.so "$ALSA_DIR/" 2>/dev/null || true
            echo "✅ Bundled $(ls "$ALSA_DIR"/*.so 2>/dev/null | wc -l) ALSA plugins"
          else
            echo "⚠️  System ALSA plugins not found at $SYS_ALSA"
          fi
          ls -la "$ALSA_DIR/" 2>/dev/null || echo "No ALSA plugins bundled"

      - run: |
          cd build/linux/x64/release/bundle
          tar -czf /tmp/aniwhere-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-linux-x64
          path: /tmp/aniwhere-linux-x64.tar.gz
          retention-days: 14
