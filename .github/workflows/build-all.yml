name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.27.1'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release/bundle
          tar -czf /tmp/aniwhere-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-linux-x64
          path: /tmp/aniwhere-linux-x64.tar.gz
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: choco install git-crypt
      - run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.GIT_CRYPT_KEY }}")
          [IO.File]::WriteAllBytes("C:\temp\key.bin", $bytes)
          git-crypt unlock "C:\temp\key.bin"
          Remove-Item "C:\temp\key.bin"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "aniwhere-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-windows-x64
          path: aniwhere-windows-x64.zip
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: brew install git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release
          zip -r /tmp/aniwhere-macos.zip aniwhere.app
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-macos
          path: /tmp/aniwhere-macos.zip
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: brew install git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd ios
          pod install || true
      - run: flutter build ios --release --no-codesign
      - run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r /tmp/aniwhere-ios.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-ios
          path: /tmp/aniwhere-ios.ipa
          retention-days: 14
