name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Set minimum macOS deployment target
        run: |
          sed -i '' 's/platform :osx, .*/platform :osx, '\''10.15'\''/' macos/Podfile
          if ! grep -q "platform :osx" macos/Podfile; then
            echo "platform :osx, '10.15'" >> macos/Podfile
          fi

      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd macos
          pod install || true
      - run: flutter build macos --release --no-tree-shake-icons

      - run: |
          cd build/macos/Build/Products/Release
          zip -r /tmp/aniwhere-macos.zip aniwhere.app

      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-macos
          path: /tmp/aniwhere-macos.zip
          retention-days: 14
