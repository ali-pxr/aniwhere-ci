name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Fix isar_flutter_libs for AGP 8.x
        run: |
          ISAR_DIR="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android"
          BUILD_FILE="$ISAR_DIR/build.gradle"
          if [ -f "$BUILD_FILE" ]; then
            # Add namespace for AGP 8.x
            if ! grep -q "namespace" "$BUILD_FILE"; then
              sed -i '/android {/a\    namespace "io.isar.isar_flutter_libs"' "$BUILD_FILE"
            fi
            # Fix compileSdkVersion (Groovy DSL format)
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' "$BUILD_FILE"
            # Fix minSdkVersion
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' "$BUILD_FILE"
          fi
          MANIFEST_FILE="$ISAR_DIR/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_FILE" ]; then
            sed -i 's/package="[^"]*"//' "$MANIFEST_FILE"
          fi

      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
