name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.32.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Fix isar_flutter_libs namespace
        run: |
          ISAR_BUILD_FILE="$HOME/.pub-cache/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/build.gradle"
          if [ -f "$ISAR_BUILD_FILE" ]; then
            if ! grep -q "namespace" "$ISAR_BUILD_FILE"; then
              sed -i '/android {/a\    namespace "io.isar.isar_flutter_libs"' "$ISAR_BUILD_FILE"
              echo "Added namespace to isar_flutter_libs"
            fi
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libjson-glib-dev
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release/bundle
          tar -czf /tmp/aniwhere-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-linux-x64
          path: /tmp/aniwhere-linux-x64.tar.gz
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - name: Setup git-crypt
        shell: cmd
        run: |
          git clone https://github.com/AGWA/git-crypt.git C:\temp\git-crypt-src
          cd C:\temp\git-crypt-src
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cl.exe /EHsc /O2 /std:c++17 /Fe:git-crypt.exe git-crypt.cpp gpg.cpp sha1.cpp sha256.cpp sha512.cpp hmac.cpp aes-ctr.cpp aead.cpp key.cpp base64.cpp util.cpp commands.cpp
          if exist git-crypt.exe (
            mkdir "C:\Program Files\git-crypt" 2>nul
            move git-crypt.exe "C:\Program Files\git-crypt\git-crypt.exe"
            echo C:\Program Files\git-crypt>> %GITHUB_PATH%
          )
      - run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.GIT_CRYPT_KEY }}")
          [IO.File]::WriteAllBytes("C:\temp\key.bin", $bytes)
          git-crypt unlock "C:\temp\key.bin"
          Remove-Item "C:\temp\key.bin"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "aniwhere-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-windows-x64
          path: aniwhere-windows-x64.zip
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: brew install git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Set minimum macOS deployment target
        run: |
          sed -i '' 's/platform :osx, .*/platform :osx, '\''10.15'\''/' macos/Podfile
          if ! grep -q "platform :osx" macos/Podfile; then
            echo "platform :osx, '10.15'" >> macos/Podfile
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd macos
          pod install || true
      - run: flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release
          zip -r /tmp/aniwhere-macos.zip aniwhere.app
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-macos
          path: /tmp/aniwhere-macos.zip
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - run: brew install git-crypt
      - run: |
          echo "${{ secrets.GIT_CRYPT_KEY }}" | base64 -d > /tmp/key.bin
          git-crypt unlock /tmp/key.bin
          rm -f /tmp/key.bin
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Set minimum iOS deployment target
        run: |
          if [ -f ios/Podfile ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/' ios/Podfile
          else
            echo "platform :ios, '12.0'" > ios/Podfile
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd ios
          pod install || true
      - run: flutter build ios --release --no-codesign
      - run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r /tmp/aniwhere-ios.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-ios
          path: /tmp/aniwhere-ios.ipa
          retention-days: 14
