name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Set minimum iOS deployment target
        run: |
          if [ -f ios/Podfile ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/' ios/Podfile
          else
            echo "platform :ios, '12.0'" > ios/Podfile
          fi

      - name: Patch volume_controller for Flutter 3.29+
        run: |
          VC_DIR="$HOME/.pub-cache/hosted/pub.dev/volume_controller-3.4.4/ios/volume_controller/Sources/volume_controller"
          SWIFT_FILE="$VC_DIR/VolumeControllerPlugin.swift"
          if [ -f "$SWIFT_FILE" ]; then
            # Remove addSceneDelegate call
            sed -i '' '/registrar.addSceneDelegate/d' "$SWIFT_FILE"
            # Remove FlutterSceneLifeCycleDelegate extension block
            sed -i '' '/@available(iOS 13.0, \*)/,/^}/d' "$SWIFT_FILE"
            echo "Patched volume_controller"
          else
            echo "volume_controller Swift file not found, skipping patch"
          fi

      - run: dart run build_runner build --delete-conflicting-outputs
      - run: |
          cd ios
          pod install || true
      - run: flutter build ios --release --no-codesign

      - run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r /tmp/aniwhere-ios.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-ios
          path: /tmp/aniwhere-ios.ipa
          retention-days: 14
