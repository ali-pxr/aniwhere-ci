name: Build Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ali-pxr/aniwhere
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libjson-glib-dev

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release --no-tree-shake-icons

      - run: |
          cd build/linux/x64/release/bundle
          tar -czf /tmp/aniwhere-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: aniwhere-linux-x64
          path: /tmp/aniwhere-linux-x64.tar.gz
          retention-days: 14
